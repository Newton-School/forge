# Local development stack — mirrors the production ECS topology at a small scale.
# client (Next.js) → server (Express) → postgres ; redis for sessions/cache.
# Production runs these as ECS Fargate services + RDS + ElastiCache (see docs/infra-ecs.md).

services:
  client:
    container_name: forge-client
    build:
      context: ./client
      dockerfile: ../docker/client.Dockerfile
      target: dev
    environment:
      - NODE_ENV=development
      # production = real backend/auth (set APP_MODE + NEXT_PUBLIC_APP_MODE to presentation
      # for the no-backend mock demo instead).
      - APP_MODE=production
      - NEXT_PUBLIC_APP_MODE=production
      # Browser → server via the host port mapping.
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      # SSR/server-components → server over the Docker network (NOT localhost, which inside
      # the client container is the client itself). This is what the /auth/me session check uses.
      - API_PROXY_TARGET=http://server:4000
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - server
    networks:
      - forge

  server:
    container_name: forge-server
    build:
      context: ./server
      dockerfile: ../docker/server.Dockerfile
      target: dev
    # Self-seeding local stack: sync the schema + upsert the bootstrap data (admin/LCC, domains,
    # test plans) on every start, then run the watcher. All steps are idempotent, so this also
    # recovers automatically after a `docker compose down -v` (which wipes the Postgres volume).
    command: sh -c "npx prisma generate && npx prisma db push && npm run db:seed && npm run dev"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - APP_BASE_URL=http://localhost:3000
      - DATABASE_URL=postgresql://forge:forge@postgres:5432/forge?schema=public
      - DIRECT_URL=postgresql://forge:forge@postgres:5432/forge?schema=public
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=dev-only-change-me
      - ALLOWED_HOSTED_DOMAIN=rishihood.edu.in
      - GOOGLE_OAUTH_REDIRECT_URI=http://localhost:4000/api/auth/google/callback
      # Host-only cookies for localhost (override any COOKIE_DOMAIN in server/.env — a prod
      # value like ".taj.works" would be rejected by the browser on localhost).
      - COOKIE_DOMAIN=
      # NOTE: GOOGLE_OAUTH_CLIENT_ID / GOOGLE_OAUTH_CLIENT_SECRET / GROQ_API_KEY are deliberately
      # NOT set here — the server reads them from the gitignored server/.env (tsx --env-file=.env).
      # Setting them to "" here would override .env (Node --env-file won't replace an already-set var).
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forge

  postgres:
    container_name: forge-postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=forge
      - POSTGRES_PASSWORD=forge
      - POSTGRES_DB=forge
    # Host port 5433 (not 5432) to avoid clashing with other local stacks (e.g.
    # maverick-postgres); the server still reaches it as postgres:5432 internally.
    ports:
      - "5433:5432"
    volumes:
      - forge_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - forge

  redis:
    container_name: forge-redis
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    # Host port 6380 (not 6379) to avoid clashing with other local stacks; the
    # server still reaches it as redis:6379 inside the compose network.
    ports:
      - "6380:6379"
    networks:
      - forge

volumes:
  forge_pg:

networks:
  forge:
    driver: bridge
