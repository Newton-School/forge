# Build Server (production) — MANUAL build & push of newtonschool/forge-server to Docker Hub.
#
# Monk CI runner. Manual only (workflow_dispatch). Dispatch from `main`: the Production
# environment is branch-restricted to main, so the Docker Hub creds are only readable there.
# Tags pushed: <commit-sha> + latest. Deploy is separate (pin the SHA in kubernetes-cluster-infra).
#
# Environment secrets (in the `Production` environment):
#   DOCKERHUB_USERNAME  — Docker Hub user owning the forge-scoped push token
#   DOCKERHUB_PASSWORD  — the forge-scoped Docker Hub access token (push to forge-* only)
name: Build Server (production)

on:
  workflow_dispatch:

concurrency:
  group: build-server-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_SERVER: newtonschool/forge-server

jobs:
  build:
    name: build & push server
    runs-on: monkci-ubuntu-24.04-2
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Image tag (immutable, full commit SHA)
        id: meta
        run: echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./docker/server.Dockerfile
          target: runner
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_SERVER }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_SERVER }}:latest

      - name: Summary
        if: always()
        run: |
          {
            echo "### forge-server pushed"
            echo "- \`${IMAGE_SERVER}:${GITHUB_SHA}\`"
            echo "- \`${IMAGE_SERVER}:latest\`"
            echo ""
            echo "**Deploy:** pin \`${GITHUB_SHA}\` in kubernetes-cluster-infra → Flux reconciles."
          } >> "$GITHUB_STEP_SUMMARY"
