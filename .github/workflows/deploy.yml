# ──────────────────────────────────────────────────────────────────────────────
# Forge — CI: build & push container images to Docker Hub.
#
# Runs on Monk CI runners (GitHub Actions-compatible; https://monkci.com/docs/quickstart).
# Merging to the default branch (main) BUILDS and PUSHES only — it does NOT deploy. Deploy is a
# separate GitOps step: bump the pinned image tag in the `kubernetes-cluster-infra` repo
# (clusters/newton-core/<env>/forge/deployments.yaml) → merge → Flux reconciles.
#
# Images (Docker Hub, org `newtonschool`):
#   newtonschool/forge-server : <full-commit-sha> + latest
#   newtonschool/forge-client : <full-commit-sha> + latest
#
# Repo secrets (Settings → Secrets and variables → Actions; surfaced to Monk CI):
#   DOCKERHUB_USERNAME  — Docker Hub user/robot with push to both repos
#   DOCKERHUB_TOKEN     — Docker Hub access token (NOT the account password)
# ──────────────────────────────────────────────────────────────────────────────
name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "server/**"
      - "docker/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_SERVER: newtonschool/forge-server
  IMAGE_CLIENT: newtonschool/forge-client

jobs:
  build:
    name: build & push (server + client)
    runs-on: monkci-ubuntu-24.04-2
    steps:
      - uses: actions/checkout@v4

      - name: Image tag (immutable, full commit SHA)
        id: meta
        run: echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./docker/server.Dockerfile
          target: runner
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_SERVER }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_SERVER }}:latest

      - name: Build & push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./docker/client.Dockerfile
          target: runner
          push: true
          provenance: false
          # NEXT_PUBLIC_* is inlined at BUILD time. Single origin: the browser calls "/api"
          # (the ALB routes /api/* and /newton/* → server). The Testing Portal stays OFF in
          # prod images — NEXT_PUBLIC_TESTING_PORTAL_ENABLED is deliberately not set.
          build-args: |
            NEXT_PUBLIC_API_URL=/api
            APP_MODE=production
          tags: |
            ${{ env.IMAGE_CLIENT }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_CLIENT }}:latest

      - name: Summary
        if: always()
        run: |
          {
            echo "### Forge images pushed"
            echo ""
            echo "| image | tags |"
            echo "|---|---|"
            echo "| \`${IMAGE_SERVER}\` | \`${GITHUB_SHA}\`, \`latest\` |"
            echo "| \`${IMAGE_CLIENT}\` | \`${GITHUB_SHA}\`, \`latest\` |"
            echo ""
            echo "**Deploy:** pin \`${GITHUB_SHA}\` in \`kubernetes-cluster-infra\` → merge → Flux reconciles."
          } >> "$GITHUB_STEP_SUMMARY"
