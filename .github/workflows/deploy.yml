# ──────────────────────────────────────────────────────────────────────────────
# Forge — AWS ECS deploy pipeline   (companion to docs/aws/index.html · CLAUDE.md)
#
# Topology deployed (single origin, path-routed — per the runbook):
#   Cloudflare → ALB (forge.taj.works) → /api/* → server :8000 · default → client :3000
#   → RDS Postgres + ElastiCache Redis · Secrets Manager · CloudWatch
#
# Flow:  assume AWS via GitHub OIDC (no static keys)
#        → terraform apply  (idempotent; auto-skips when infra/terraform is empty)
#        → ensure ECR repos exist (idempotent)
#        → build & push server + client images to ECR
#        → prisma db push as a one-off ECS task inside the VPC (RDS is private)
#        → register rendered task defs → ECS rolling deploy (circuit breaker = auto-rollback)
#
# Every step is IDEMPOTENT: re-running on the same commit converges to the same
# state — terraform no-ops, ECR ensure no-ops, `db push` converges the schema,
# and `update-service` is a no-op when the task def is unchanged.
#
# ── ONE-TIME PREREQUISITES (see docs/aws/index.html for the full runbook) ──────
#   AWS: GitHub OIDC provider + deploy role → secrets.AWS_DEPLOY_ROLE_ARN
#        ECS cluster forge-<env> + services forge-server-<env> / forge-client-<env>
#        RDS · ElastiCache · ALB+ACM · Secrets Manager /forge/<env>/* · log groups
#        (created by infra/terraform or by hand — this pipeline UPDATES services,
#         it does not create the cluster/services/ALB).
#   GitHub → Settings → Secrets and variables → Actions:
#     Secrets:   AWS_DEPLOY_ROLE_ARN
#     Variables: AWS_REGION, AWS_ACCOUNT_ID, APP_ORIGIN (e.g. https://forge.taj.works),
#                PRIVATE_SUBNET_IDS (comma-separated), SERVER_SECURITY_GROUP_ID
#     Variables (optional): ECS_CLUSTER, SERVER_SERVICE, CLIENT_SERVICE,
#                DB_DEPLOY_CMD (default "prisma db push"),
#                TF_STATE_BUCKET, TF_STATE_KEY, TF_STATE_LOCK_TABLE
# ──────────────────────────────────────────────────────────────────────────────
name: deploy

on:
  # push:
  #   branches: [main]
  #   paths:
  #     - "client/**"
  #     - "server/**"
  #     - "docker/**"
  #     - "infra/**"
  #     - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        default: prod
        options: [staging, prod]
      skip_terraform:
        description: "Skip terraform apply (deploy against existing infra)"
        type: boolean
        default: false
      run_migrations:
        description: "Run `prisma db push` before the rollout"
        type: boolean
        default: true

# One deploy per environment at a time. Do NOT cancel an in-flight deploy — that
# could leave ECS mid-rollout; let it finish.
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'prod' }}
  cancel-in-progress: false

permissions:
  id-token: write   # mint the OIDC token AWS trusts
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}
  ECR_SERVER: forge-server
  ECR_CLIENT: forge-client

jobs:
  # ── 1. Converge infrastructure (idempotent; auto-skips when no .tf present) ──
  terraform:
    name: terraform apply
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_terraform != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect terraform
        id: detect
        run: |
          if ls infra/terraform/*.tf >/dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=terraform skipped::infra/terraform has no .tf files — deploying against existing infrastructure."
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.detect.outputs.present == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        if: steps.detect.outputs.present == 'true'
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        if: steps.detect.outputs.present == 'true'
        working-directory: infra/terraform
        run: |
          ARGS=()
          [ -n "${{ vars.TF_STATE_BUCKET }}" ]     && ARGS+=("-backend-config=bucket=${{ vars.TF_STATE_BUCKET }}")
          [ -n "${{ vars.TF_STATE_KEY }}" ]        && ARGS+=("-backend-config=key=${{ vars.TF_STATE_KEY }}")
          [ -n "${{ env.AWS_REGION }}" ]           && ARGS+=("-backend-config=region=${{ env.AWS_REGION }}")
          [ -n "${{ vars.TF_STATE_LOCK_TABLE }}" ] && ARGS+=("-backend-config=dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}")
          terraform init -input=false "${ARGS[@]}"

      - name: Terraform apply (idempotent)
        if: steps.detect.outputs.present == 'true'
        working-directory: infra/terraform
        run: terraform apply -input=false -auto-approve
        env:
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_app_origin: ${{ vars.APP_ORIGIN }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
          TF_VAR_ses_identity_domain: ${{ vars.SES_IDENTITY_DOMAIN }}
          # Scoped Cloudflare token (DNS:Edit) — only needed when manage_dns = true.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── 2. Build & push both images to ECR ───────────────────────────────────────
  build:
    name: build & push images
    runs-on: ubuntu-latest
    needs: terraform
    # terraform "skipped" (via input) must not block the build.
    if: ${{ always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist (idempotent)
        run: |
          for repo in "$ECR_SERVER" "$ECR_CLIENT"; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$repo" \
                   --image-scanning-configuration scanOnPush=true \
                   --tags Key=app,Value=forge Key=env,Value="$ENVIRONMENT"
          done

      - name: Compute image tag (immutable, from commit SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./docker/server.Dockerfile
          target: runner
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_SERVER }}:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_SERVER }}:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build & push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./docker/client.Dockerfile
          target: runner
          push: true
          provenance: false
          # NEXT_PUBLIC_* is inlined at build time → must be a build arg, not just
          # task-def env. Single origin: the browser calls the relative "/api".
          build-args: |
            NEXT_PUBLIC_API_URL=/api
            APP_MODE=production
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_CLIENT }}:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_CLIENT }}:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max

  # ── 3. Migrate schema + rolling-deploy both services ─────────────────────────
  release:
    name: migrate & deploy
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER || format('forge-{0}', github.event.inputs.environment || 'prod') }}
      SERVER_SERVICE: ${{ vars.SERVER_SERVICE || format('forge-server-{0}', github.event.inputs.environment || 'prod') }}
      CLIENT_SERVICE: ${{ vars.CLIENT_SERVICE || format('forge-client-{0}', github.event.inputs.environment || 'prod') }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      # Substitute <PLACEHOLDER> tokens and drop the JSON's _comment/_note keys
      # (RegisterTaskDefinition rejects unknown keys). APP_ORIGIN drives the single
      # origin used for APP_BASE_URL + OAuth redirect URIs.
      - name: Render task definitions
        run: |
          set -euo pipefail
          render() {
            sed -e "s|<ACCOUNT_ID>|${ACCOUNT_ID}|g" \
                -e "s|<REGION>|${AWS_REGION}|g" \
                -e "s|<ENV>|${ENVIRONMENT}|g" \
                -e "s|<IMAGE_TAG>|${IMAGE_TAG}|g" \
                -e "s|<APP_ORIGIN>|${APP_ORIGIN}|g" "$1" \
            | jq 'walk(if type == "object"
                       then with_entries(select(.key | startswith("_") | not))
                       else . end)' > "$2"
          }
          render infra/ecs/task-def.server.json server.taskdef.json
          render infra/ecs/task-def.client.json client.taskdef.json
        env:
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}

      - name: Inject server image
        id: server-td
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: server.taskdef.json
          container-name: server
          image: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_SERVER }}:${{ env.IMAGE_TAG }}

      # Schema sync (`prisma db push`, per the runbook) as a one-off ECS task in the
      # private subnets — RDS is not publicly reachable from the GitHub runner.
      # `db push` is idempotent: it converges RDS to the schema and no-ops when in sync.
      - name: Run schema migration (prisma db push)
        if: ${{ github.event.inputs.run_migrations != 'false' }}
        run: |
          set -euo pipefail
          DB_CMD="${{ vars.DB_DEPLOY_CMD || 'prisma db push' }}"
          CMD_JSON=$(printf '%s' "npx $DB_CMD" | jq -Rc 'split(" ")')

          TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://${{ steps.server-td.outputs.task-definition }}" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Migration task def: $TD_ARN"

          SUBNETS=$(echo "${{ vars.PRIVATE_SUBNET_IDS }}" | jq -Rc 'split(",")')
          OVERRIDES=$(jq -nc --argjson cmd "$CMD_JSON" \
            '{containerOverrides:[{name:"server",command:$cmd}]}')
          NETWORK=$(jq -nc --argjson subnets "$SUBNETS" --arg sg "${{ vars.SERVER_SECURITY_GROUP_ID }}" \
            '{awsvpcConfiguration:{subnets:$subnets,securityGroups:[$sg],assignPublicIp:"DISABLED"}}')

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$TD_ARN" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK" \
            --overrides "$OVERRIDES" \
            --started-by "gha-migrate-${IMAGE_TAG}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"

          EXIT=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[?name==`server`].exitCode | [0]' --output text)
          REASON=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' --output text)
          echo "Migration exit code: $EXIT (reason: $REASON)"
          if [ "$EXIT" != "0" ]; then
            echo "::error title=Migration failed::exit=$EXIT — $REASON. See /ecs/forge/${ENVIRONMENT}/server logs."
            exit 1
          fi

      - name: Deploy server (rolling, auto-rollback)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.server-td.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.SERVER_SERVICE }}
          wait-for-service-stability: true

      - name: Inject client image
        id: client-td
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: client.taskdef.json
          container-name: client
          image: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_CLIENT }}:${{ env.IMAGE_TAG }}

      - name: Deploy client (rolling, auto-rollback)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.client-td.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.CLIENT_SERVICE }}
          wait-for-service-stability: true

      - name: Summary
        if: always()
        run: |
          {
            echo "### Forge deploy — \`${ENVIRONMENT}\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| image tag | \`${IMAGE_TAG}\` |"
            echo "| cluster | \`${ECS_CLUSTER}\` |"
            echo "| server  | \`${SERVER_SERVICE}\` |"
            echo "| client  | \`${CLIENT_SERVICE}\` |"
            echo "| origin  | ${{ vars.APP_ORIGIN }} |"
          } >> "$GITHUB_STEP_SUMMARY"
