# Optional local reverse proxy that mirrors the ALB path-routing:
#   /api/*  → server (Express :4000)
#   /*      → client (Next.js :3000)
# In production the Application Load Balancer does this (see docs/infra-ecs.md);
# this file is only for an all-in-one local/edge container if desired.

worker_processes auto;
events { worker_connections 1024; }

http {
  sendfile on;
  server_tokens off;            # don't leak nginx version
  client_max_body_size 25m;

  # security headers (ALB/Cloudflare also set these in prod)
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  upstream client_app { server client:3000; }
  upstream server_api { server server:4000; }

  server {
    listen 80;

    # API → Express
    location /api/ {
      proxy_pass http://server_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # everything else → Next.js
    location / {
      proxy_pass http://client_app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
